<!DOCTYPE html>
<html>
<head>
  <title>Gridiron Legends</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu" class="screen">
  <h1>🏈 GRIDIRON LEGENDS</h1>
  <button onclick="show('gameScreen')">Play</button>
  <button onclick="show('rosterScreen')">Roster</button>
  <button onclick="show('tradeScreen')">Trade</button>
  <button onclick="show('faScreen')">Free Agency</button>
  <button onclick="toggleSandbox()">Sandbox</button>
</div>

<div id="gameScreen" class="screen hidden">
  <canvas id="game"></canvas>
  <button onclick="show('menu')">Exit</button>
</div>

<div id="rosterScreen" class="screen hidden"></div>
<div id="tradeScreen" class="screen hidden"></div>
<div id="faScreen" class="screen hidden"></div>

<script src="game.js"></script>
</body>
</html>
