<!DOCTYPE html>
<html>
<head>
  <title>Retro Gridiron</title>
  <style>
    body {
      margin:0;
      font-family:Arial;
      color:white;
      overflow:hidden;
    }

    /* Stadium Background */
    .bg {
      position:fixed;
      width:100%;
      height:100%;
      background: linear-gradient(#0a5, #063);
    }

    /* Center Screen */
    .screen {
      position:absolute;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    h1 {
      font-size:48px;
      margin-bottom:40px;
      text-shadow:0 0 20px black;
    }

    .big-btn {
      width:260px;
      padding:20px;
      margin:15px;
      font-size:20px;
      border:none;
      cursor:pointer;
      background:#0c8;
      color:white;
      border-radius:10px;
      transition:0.2s;
    }

    .big-btn:hover {
      background:#0ea;
      transform:scale(1.05);
    }

    .panel {
      background:rgba(0,0,0,0.6);
      padding:20px;
      border-radius:10px;
    }

    .btn {
      padding:10px;
      margin:5px;
      background:#0c8;
      border:none;
      color:white;
      cursor:pointer;
    }

  </style>
</head>
<body>

<div class="bg"></div>

<!-- MAIN MENU -->
<div id="menu" class="screen">
  <h1>🏈 Retro Gridiron</h1>
  <button class="big-btn" onclick="goFranchise()">Franchise Mode</button>
  <button class="big-btn" onclick="startQuick()">Quick Play</button>
</div>

<!-- FRANCHISE HUB -->
<div id="hub" class="screen" style="display:none;">
  <div class="panel">
    <h2>Metro Hawks</h2>
    <p id="record"></p>

    <button class="btn" onclick="playGame()">Play Game</button>
    <button class="btn" onclick="viewRoster()">Roster</button>
    <button class="btn" onclick="freeAgency()">Free Agency</button>
    <button class="btn" onclick="toggleSandbox()">Toggle Sandbox</button>
    <button class="btn" onclick="backMenu()">Back</button>
  </div>
</div>

<script>
// ================= DATA =================
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function genPlayer(){
  let names=["Jay","Mike","Chris","Ty","AJ","Cam"];
  let lasts=["Smith","Brown","Davis","Wilson"];
  let ovr=rand(60,90);
  return {
    name:names[rand(0,5)]+" "+lasts[rand(0,3)],
    ovr:ovr,
    salary:ovr*10
  };
}

let team={
  roster:[genPlayer(),genPlayer(),genPlayer()],
  cap:1000
};

let freeAgents = Array.from({length:6},()=>genPlayer());

let wins=0, losses=0, week=1;
let sandbox=false;

// ================= NAV =================
function show(id){
  document.getElementById("menu").style.display="none";
  document.getElementById("hub").style.display="none";

  document.getElementById(id).style.display="flex";
}

function backMenu(){
  show("menu");
}

// ================= MENU =================
function goFranchise(){
  show("hub");
  updateHub();
}

function startQuick(){
  let win = Math.random() > 0.5;
  alert(win ? "Quick Win!" : "Quick Loss!");
}

// ================= HUB =================
function updateHub(){
  document.getElementById("record").innerText =
    `Record: ${wins}-${losses} | Week ${week} | Cap: $${team.cap}`;
}

// ================= GAME =================
function playGame(){
  let teamOVR = avg(team.roster);
  let result = teamOVR + rand(-10,10) > 75;

  if(result){
    wins++;
    alert("You Won!");
  } else {
    losses++;
    alert("You Lost!");
  }

  week++;

  if(week>10){
    playoffs();
  }

  updateHub();
}

function avg(r){
  return r.reduce((a,b)=>a+b.ovr,0)/r.length;
}

function playoffs(){
  if(wins<6){
    alert("Missed Playoffs");
  } else {
    alert("🏆 Championship!");
  }

  wins=0;
  losses=0;
  week=1;
}

// ================= ROSTER =================
function viewRoster(){
  let text="Roster:\n";
  team.roster.forEach(p=>{
    text+=`${p.name} | OVR ${p.ovr}\n`;
  });
  alert(text);
}

// ================= FA =================
function freeAgency(){
  let text="Free Agents:\n";
  freeAgents.forEach((p,i)=>{
    text+=`${i+1}. ${p.name} OVR ${p.ovr} $${p.salary}\n`;
  });

  let pick=prompt(text+"\nPick number:");
  let p=freeAgents[pick-1];
  if(!p) return;

  if(!sandbox && team.cap < p.salary){
    alert("No cap!");
    return;
  }

  team.cap -= p.salary;
  team.roster.push(p);
  freeAgents.splice(pick-1,1);

  alert("Signed "+p.name);
  updateHub();
}

// ================= SETTINGS =================
function toggleSandbox(){
  sandbox=!sandbox;
  alert("Sandbox: "+(sandbox?"ON":"OFF"));
}
</script>

</body>
</html>
