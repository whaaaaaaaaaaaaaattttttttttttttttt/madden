<!DOCTYPE html>
<html>
<head>
  <title>Retro Gridiron Franchise</title>
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b5;
      color:white;
    }

    header {
      background:#063;
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      display:flex;
      height:calc(100vh - 60px);
    }

    .sidebar {
      width:220px;
      background:#074;
      padding:15px;
    }

    .sidebar button {
      width:100%;
      margin:6px 0;
      padding:10px;
      border:none;
      background:#0a6;
      color:white;
      cursor:pointer;
      font-size:14px;
    }

    .sidebar button:hover {
      background:#0c8;
    }

    .content {
      flex:1;
      padding:20px;
      overflow:auto;
    }

    .card {
      background:#086;
      padding:10px;
      margin:8px 0;
      border-radius:6px;
      display:flex;
      justify-content:space-between;
    }

    .topbar {
      margin-bottom:15px;
      font-size:16px;
    }

    .btn {
      background:#0c8;
      border:none;
      padding:8px 12px;
      cursor:pointer;
      color:white;
      margin:5px;
    }
  </style>
</head>
<body>

<header>🏈 Retro Gridiron Franchise</header>

<div class="container">

  <div class="sidebar">
    <button onclick="showTab('hub')">Hub</button>
    <button onclick="showTab('roster')">Roster</button>
    <button onclick="showTab('fa')">Free Agency</button>
    <button onclick="showTab('settings')">Settings</button>
  </div>

  <div class="content">

    <div id="hubTab">
      <div class="topbar" id="record"></div>
      <button class="btn" onclick="playGame()">Play Game</button>
    </div>

    <div id="rosterTab" style="display:none;"></div>

    <div id="faTab" style="display:none;"></div>

    <div id="settingsTab" style="display:none;">
      <button class="btn" onclick="toggleSandbox()">Toggle Sandbox</button>
    </div>

  </div>

</div>

<script>
// ================= DATA =================
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function genPlayer(){
  let names=["Jay","Mike","Chris","Ty","AJ","Cam","Zay"];
  let lasts=["Smith","Brown","Davis","Wilson"];
  let ovr = rand(60,90);
  return {
    name:names[rand(0,6)]+" "+lasts[rand(0,3)],
    ovr:ovr,
    salary:ovr*10
  };
}

let myTeam={
  roster:[genPlayer(),genPlayer(),genPlayer()],
  cap:1000
};

let freeAgents = Array.from({length:8},()=>genPlayer());

let sandbox=false;
let wins=0, losses=0, week=1;

// ================= NAV =================
function showTab(tab){
  ["hub","roster","fa","settings"].forEach(t=>{
    document.getElementById(t+"Tab").style.display="none";
  });

  document.getElementById(tab+"Tab").style.display="block";

  if(tab==="roster") renderRoster();
  if(tab==="fa") renderFA();
}

// ================= HUB =================
function updateHub(){
  document.getElementById("record").innerText =
    `Record: ${wins}-${losses} | Week ${week} | Cap: $${myTeam.cap}`;
}

// ================= ROSTER =================
function renderRoster(){
  let div=document.getElementById("rosterTab");
  div.innerHTML="<h2>Your Team</h2>";

  myTeam.roster.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        ${p.name} | OVR ${p.ovr}
        <button class="btn" onclick="cutPlayer(${i})">Cut</button>
      </div>`;
  });
}

function cutPlayer(i){
  let p = myTeam.roster[i];
  myTeam.cap += p.salary;
  myTeam.roster.splice(i,1);
  renderRoster();
}

// ================= FREE AGENCY =================
function renderFA(){
  let div=document.getElementById("faTab");
  div.innerHTML="<h2>Free Agents</h2>";

  freeAgents.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        ${p.name} | OVR ${p.ovr} | $${p.salary}
        <button class="btn" onclick="signPlayer(${i})">Sign</button>
      </div>`;
  });
}

function signPlayer(i){
  let p = freeAgents[i];

  if(!sandbox && myTeam.cap < p.salary){
    alert("Not enough cap!");
    return;
  }

  myTeam.cap -= p.salary;
  myTeam.roster.push(p);
  freeAgents.splice(i,1);

  renderFA();
  updateHub();
}

// ================= SETTINGS =================
function toggleSandbox(){
  sandbox = !sandbox;
  alert("Sandbox: "+(sandbox?"ON":"OFF"));
}

// ================= GAME =================
function avgOVR(){
  return myTeam.roster.reduce((a,b)=>a+b.ovr,0)/myTeam.roster.length;
}

function playGame(){
  let win = avgOVR() + rand(-10,10) > 75;

  if(win){ wins++; alert("Win!"); }
  else { losses++; alert("Loss!"); }

  week++;

  if(week>10){
    playoffs();
  }

  updateHub();
}

function playoffs(){
  if(wins<6){
    alert("Missed Playoffs");
  } else {
    alert("🏆 Championship Run!");
  }

  wins=0;
  losses=0;
  week=1;
}

// INIT
updateHub();
renderRoster();
</script>

</body>
</html>
