<!DOCTYPE html>
<html>
<head>
  <title>Retro Gridiron Final</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b5; color:white; text-align:center;}
    canvas { display:block; margin:auto; border:4px solid white; background:#083;}
    button { padding:10px 20px; margin:8px; font-size:16px;}
  </style>
</head>
<body>

<div id="menu">
  <h1>🏈 Retro Gridiron</h1>
  <button onclick="startQuick()">Quick Play</button>
  <button onclick="startFranchise()">Franchise</button>
</div>

<div id="hub" style="display:none;">
  <h2>Metro Hawks</h2>
  <p id="record"></p>
  <button onclick="playGame()">Play Game</button>
  <button onclick="upgrade()">Upgrade</button>
  <button onclick="viewRoster()">Roster</button>
</div>

<div id="roster" style="display:none;">
  <h2>Roster</h2>
  <pre id="rosterText"></pre>
  <button onclick="backHub()">Back</button>
</div>

<canvas id="game" width="700" height="350" style="display:none;"></canvas>

<script>
<script>
// ======================
// CORE DATA
// ======================
const FIRST_NAMES = ["Jay","Mike","Chris","Ty","AJ","Dee","Cam","Zay","Noah","Eli"];
const LAST_NAMES = ["Smith","Johnson","Brown","Davis","Miller","Wilson","Moore","Taylor"];

function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function genPlayer(){
  return {
    name: FIRST_NAMES[rand(0,9)]+" "+LAST_NAMES[rand(0,7)],
    ovr: rand(60,90),
    salary: 0
  };
}

// generate 32 teams
let league = [];
for(let i=0;i<32;i++){
  let team = {
    name:"Team "+(i+1),
    ovr:rand(65,90),
    roster:[genPlayer(),genPlayer(),genPlayer()]
  };
  team.roster.forEach(p=>p.salary = p.ovr * 10);
  league.push(team);
}

// YOUR TEAM
let myTeam = {
  name:"Metro Hawks",
  roster:[genPlayer(),genPlayer(),genPlayer()],
  cap:1000
};
myTeam.roster.forEach(p=>p.salary = p.ovr*10);

let freeAgents = [];
for(let i=0;i<10;i++){
  let p = genPlayer();
  p.salary = p.ovr * 10;
  freeAgents.push(p);
}

let sandbox = false;

// ======================
// UI NAV
// ======================
function openSettings(){
  let toggle = confirm("Enable Sandbox Mode? (No salary cap)");
  sandbox = toggle;
}

function viewRoster(){
  let text="YOUR TEAM:\n";
  myTeam.roster.forEach((p,i)=>{
    text+=`${i+1}. ${p.name} - OVR ${p.ovr} ($${p.salary})\n`;
  });

  alert(text);
}

// ======================
// FREE AGENCY
// ======================
function freeAgency(){
  let text="FREE AGENTS:\n";
  freeAgents.forEach((p,i)=>{
    text+=`${i+1}. ${p.name} OVR ${p.ovr} ($${p.salary})\n`;
  });

  let pick = prompt(text+"\nEnter number to sign:");
  let player = freeAgents[pick-1];
  if(!player) return;

  if(!sandbox && myTeam.cap < player.salary){
    alert("Not enough cap!");
    return;
  }

  myTeam.cap -= player.salary;
  myTeam.roster.push(player);
  freeAgents.splice(pick-1,1);

  alert("Signed "+player.name);
}

// ======================
// TRADES
// ======================
function trade(){
  let other = league[rand(0,31)];
  let theirPlayer = other.roster[0];
  let myPlayer = myTeam.roster[0];

  if(!theirPlayer || !myPlayer) return;

  if(theirPlayer.ovr > myPlayer.ovr + 10){
    alert("Trade declined!");
    return;
  }

  other.roster[0] = myPlayer;
  myTeam.roster[0] = theirPlayer;

  alert("Trade completed!");
}

// ======================
// SEASON + PLAYOFFS
// ======================
let wins=0, losses=0, week=1;

function playGame(){
  let myOVR = avgOVR(myTeam.roster);
  let opp = league[rand(0,31)];
  let oppOVR = avgOVR(opp.roster);

  let result = myOVR + rand(-10,10) > oppOVR;

  if(result){ wins++; alert("You beat "+opp.name); }
  else { losses++; alert("Lost to "+opp.name); }

  week++;

  if(week>10){
    playoffs();
  }
}

function avgOVR(r){
  return r.reduce((a,b)=>a+b.ovr,0)/r.length;
}

function playoffs(){
  if(wins < 6){
    alert("Missed playoffs!");
    resetSeason();
    return;
  }

  let rounds = ["Wild Card","Divisional","Championship","Super Bowl"];

  for(let r of rounds){
    let win = Math.random() > 0.4;
    if(!win){
      alert("Eliminated in "+r);
      resetSeason();
      return;
    }
  }

  alert("🏆 YOU WON THE CHAMPIONSHIP!");
  resetSeason();
}

function resetSeason(){
  wins=0;
  losses=0;
  week=1;
}

// ======================
// SIMPLE HUB
// ======================
function hub(){
  let choice = prompt(
`W:${wins} L:${losses} Week:${week}
Cap:$${myTeam.cap}

1.Play Game
2.Roster
3.Free Agency
4.Trade
5.Settings`
  );

  if(choice=="1") playGame();
  if(choice=="2") viewRoster();
  if(choice=="3") freeAgency();
  if(choice=="4") trade();
  if(choice=="5") openSettings();

  setTimeout(hub,100);
}

hub();
</script>
</script>

</body>
</html>
