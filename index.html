<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gridiron Legends</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>🏈 GRIDIRON LEGENDS</h1>
  <button onclick="go('game')">Play</button>
  <button onclick="go('roster')">Roster</button>
  <button onclick="go('trade')">Trade</button>
  <button onclick="go('fa')">Free Agency</button>
  <button onclick="toggleSandbox()">Sandbox</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <canvas id="c"></canvas>
  <button class="back" onclick="go('menu')">Back</button>
</div>

<!-- ROSTER -->
<div id="roster" class="screen">
  <div id="rosterList" class="panel"></div>
  <button class="back" onclick="go('menu')">Back</button>
</div>

<!-- TRADE -->
<div id="trade" class="screen">
  <div id="tradeList" class="panel"></div>
  <button class="back" onclick="go('menu')">Back</button>
</div>

<!-- FREE AGENCY -->
<div id="fa" class="screen">
  <div id="faList" class="panel"></div>
  <button class="back" onclick="go('menu')">Back</button>
</div>

<script src="systems.js"></script>
<script src="game.js"></script>

</body>
</html>
