<!DOCTYPE html>
<html>
<head>
  <title>Gridiron Legends v2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b5;
      color: white;
      text-align: center;
    }
    canvas {
      background: #0a3;
      display: block;
      margin: auto;
      border: 4px solid white;
    }
    #menu {
      margin-top: 40px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>🏈 Gridiron Legends v2</h1>
  <p>Select Your Team</p>
  <div id="teams"></div>
</div>

<canvas id="game" width="900" height="400" style="display:none;"></canvas>

<script>
const TEAMS = [
  { name: "Metro Hawks", color: "red" },
  { name: "Iron Wolves", color: "blue" },
  { name: "Desert Vipers", color: "orange" },
  { name: "Glacier Titans", color: "cyan" }
];

let playerTeam = null;

const teamDiv = document.getElementById("teams");
TEAMS.forEach((team, i) => {
  const btn = document.createElement("button");
  btn.innerText = team.name;
  btn.onclick = () => startGame(i);
  teamDiv.appendChild(btn);
});

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, defenders, ball;
let score, time;
let down, yardsToGo, lineOfScrimmage, firstDownLine;

function startGame(teamIndex) {
  playerTeam = TEAMS[teamIndex];
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";

  initDrive();

  score = 0;
  time = 120;

  gameLoop();
}

function initDrive() {
  player = { x: 100, y: 200, speed: 3 };
  ball = { x: player.x, y: player.y, vx: 0, vy: 0, thrown: false };

  defenders = [];
  for (let i = 0; i < 6; i++) {
    defenders.push({ x: 400 + i*50, y: Math.random()*400 });
  }

  down = 1;
  yardsToGo = 100;
  lineOfScrimmage = 100;
  firstDownLine = lineOfScrimmage + 100;
}

const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
  // Player movement
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;

  // Throw ball
  if (keys[" "] && !ball.thrown) {
    ball.vx = 7;
    ball.vy = 0;
    ball.thrown = true;
  }

  if (!ball.thrown) {
    ball.x = player.x;
    ball.y = player.y;
  } else {
    ball.x += ball.vx;
  }

  // DEFENSE (can move backward + smarter tracking)
  defenders.forEach(d => {
    let dx = player.x - d.x;
    let dy = player.y - d.y;

    d.x += dx * 0.02; // allows backward + forward movement
    d.y += dy * 0.05;

    // tackle
    if (Math.abs(d.x - player.x) < 10 && Math.abs(d.y - player.y) < 10) {
      nextDown();
    }
  });

  // Touchdown
  if (player.x >= 880) {
    score += 7;
    initDrive();
  }

  time -= 1/60;
  if (time <= 0) {
    alert("Final Score: " + score);
    location.reload();
  }
}

function nextDown() {
  let gained = player.x - lineOfScrimmage;

  if (player.x >= firstDownLine) {
    // FIRST DOWN
    lineOfScrimmage = player.x;
    firstDownLine = lineOfScrimmage + 100;
    down = 1;
  } else {
    down++;
    if (down > 4) {
      // turnover
      initDrive();
      return;
    }
  }

  player.x = lineOfScrimmage;
  player.y = 200;
  ball.thrown = false;
}

function drawField() {
  ctx.fillStyle = "#0a3";
  ctx.fillRect(0,0,900,400);

  // Yard lines every 50px
  ctx.strokeStyle = "white";
  for (let i = 0; i < 900; i += 50) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, 400);
    ctx.stroke();
  }

  // Line of scrimmage
  ctx.strokeStyle = "blue";
  ctx.beginPath();
  ctx.moveTo(lineOfScrimmage, 0);
  ctx.lineTo(lineOfScrimmage, 400);
  ctx.stroke();

  // First down line
  ctx.strokeStyle = "yellow";
  ctx.beginPath();
  ctx.moveTo(firstDownLine, 0);
  ctx.lineTo(firstDownLine, 400);
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0,0,900,400);

  drawField();

  // Player
  ctx.fillStyle = playerTeam.color;
  ctx.fillRect(player.x, player.y, 12, 12);

  // Ball
  ctx.fillStyle = "brown";
  ctx.fillRect(ball.x, ball.y, 6, 6);

  // Defenders
  ctx.fillStyle = "white";
  defenders.forEach(d => ctx.fillRect(d.x, d.y, 12, 12));

  // UI
  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 10, 20);
  ctx.fillText("Time: " + Math.floor(time), 10, 40);
  ctx.fillText("Down: " + down, 10, 60);
  ctx.fillText("To Go: " + Math.max(0, firstDownLine - player.x), 10, 80);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
