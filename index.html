<!DOCTYPE html>
<html>
<head>
  <title>Retro Gridiron</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b5; color:white; text-align:center;}
    canvas { display:block; margin:auto; border:4px solid white; background:#083;}
    button { padding:10px 20px; margin:8px; font-size:16px;}
  </style>
</head>
<body>

<div id="menu">
  <h1>🏈 Retro Gridiron</h1>
  <button onclick="startQuick()">Quick Play</button>
  <button onclick="startFranchise()">Franchise Mode</button>
</div>

<div id="hub" style="display:none;">
  <h2 id="teamName"></h2>
  <p id="record"></p>
  <button onclick="playGame()">Play Game</button>
  <button onclick="upgrade()">Upgrade</button>
  <button onclick="viewRoster()">View Roster</button>
  <button onclick="backToMenu()">Back</button>
</div>

<div id="roster" style="display:none;">
  <h2>Roster</h2>
  <p id="rosterText"></p>
  <button onclick="backToHub()">Back</button>
</div>

<canvas id="game" width="700" height="350" style="display:none;"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let mode = "quick";

let state = {
  wins:0,
  losses:0,
  week:1,
  player:{ speed:2.5, catch:0.8 }
};

let qb, defenders;
let inGame=false;

function startQuick(){
  mode="quick";
  playGame();
}

function startFranchise(){
  mode="franchise";
  document.getElementById("menu").style.display="none";
  document.getElementById("hub").style.display="block";
  updateHub();
}

function updateHub(){
  document.getElementById("teamName").innerText = "Metro Hawks";
  document.getElementById("record").innerText =
    `Record: ${state.wins}-${state.losses} | Week ${state.week}`;
}

function backToMenu(){
  document.getElementById("hub").style.display="none";
  document.getElementById("menu").style.display="block";
}

function viewRoster(){
  document.getElementById("hub").style.display="none";
  document.getElementById("roster").style.display="block";

  document.getElementById("rosterText").innerText =
    `QB Speed: ${state.player.speed.toFixed(1)}
Catch: ${state.player.catch.toFixed(2)}`;
}

function backToHub(){
  document.getElementById("roster").style.display="none";
  document.getElementById("hub").style.display="block";
}

function upgrade(){
  state.player.speed += 0.2;
  state.player.catch += 0.05;
  alert("Upgraded!");
  updateHub();
}

function playGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("hub").style.display="none";
  document.getElementById("roster").style.display="none";
  canvas.style.display="block";

  qb = {x:80,y:175};
  defenders = [];
  for(let i=0;i<4;i++){
    defenders.push({x:350+i*40,y:Math.random()*350});
  }

  inGame=true;
  gameLoop();
}

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){
  let speed = keys["Shift"] ? state.player.speed+1 : state.player.speed;

  if(keys["w"]) qb.y -= speed;
  if(keys["s"]) qb.y += speed;
  if(keys["d"]) qb.x += speed;

  // smarter AI (predict movement)
  defenders.forEach(d=>{
    let targetX = qb.x + 30; // predict forward
    let targetY = qb.y;

    d.x += (targetX - d.x)*0.05;
    d.y += (targetY - d.y)*0.05;

    if(Math.abs(d.x-qb.x)<12 && Math.abs(d.y-qb.y)<12){
      endGame(false);
    }
  });

  if(qb.x > 650){
    endGame(true);
  }
}

function endGame(win){
  inGame=false;

  if(mode==="franchise"){
    if(win) state.wins++;
    else state.losses++;
    state.week++;
  }

  alert(win ? "Touchdown! You win!" : "Tackled! You lose!");

  canvas.style.display="none";

  if(mode==="franchise"){
    document.getElementById("hub").style.display="block";
    updateHub();
  } else {
    document.getElementById("menu").style.display="block";
  }
}

function draw(){
  ctx.fillStyle="#083";
  ctx.fillRect(0,0,700,350);

  // yard lines
  ctx.strokeStyle="white";
  for(let i=0;i<700;i+=50){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i,350);
    ctx.stroke();
  }

  // QB
  ctx.fillStyle="yellow";
  ctx.fillRect(qb.x,qb.y,14,14);

  // defenders
  ctx.fillStyle="white";
  defenders.forEach(d=>ctx.fillRect(d.x,d.y,12,12));
}

function gameLoop(){
  if(inGame){
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }
}
</script>

</body>
</html>
