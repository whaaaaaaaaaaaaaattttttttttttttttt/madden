<!DOCTYPE html>
<html>
<head>
  <title>Gridiron Engine</title>
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b5;
      color:white;
    }

    .page {
      display:none;
      padding:20px;
    }

    .active {
      display:block;
    }

    .menu {
      text-align:center;
      margin-top:100px;
    }

    .btn {
      padding:14px 20px;
      margin:10px;
      background:#0c8;
      border:none;
      color:white;
      cursor:pointer;
      border-radius:10px;
      font-size:16px;
    }

    .card {
      background:#064;
      padding:10px;
      margin:8px 0;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .avatar {
      width:40px;
      height:40px;
      border-radius:50%;
      background:#fff;
      color:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
    }

    canvas {
      background:#083;
      display:block;
      margin:auto;
    }
  </style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="page active menu">
  <h1>🏈 Grid Engine</h1>
  <button class="btn" onclick="go('play')">Play</button>
  <button class="btn" onclick="go('roster')">Roster</button>
  <button class="btn" onclick="go('trade')">Trade</button>
  <button class="btn" onclick="go('fa')">Free Agency</button>
</div>

<!-- PLAY -->
<div id="play" class="page">
  <button class="btn" onclick="go('menu')">Back</button>
  <canvas id="game" width="700" height="350"></canvas>
</div>

<!-- ROSTER -->
<div id="roster" class="page">
  <button class="btn" onclick="go('menu')">Back</button>
  <h2>Roster</h2>
  <div id="rosterList"></div>
</div>

<!-- TRADE -->
<div id="trade" class="page">
  <button class="btn" onclick="go('menu')">Back</button>
  <h2>Trade Center</h2>
  <div id="tradeList"></div>
</div>

<!-- FREE AGENCY -->
<div id="fa" class="page">
  <button class="btn" onclick="go('menu')">Back</button>
  <h2>Free Agency</h2>
  <div id="faList"></div>
</div>

<script>

// ================= NAV =================
function go(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  if(page==="roster") renderRoster();
  if(page==="trade") renderTrade();
  if(page==="fa") renderFA();
}

// ================= PLAYER SYSTEM =================
function player(name){
  let ovr = rand(60,95);
  return {
    name,
    ovr,
    img: initials(name),
    salary: ovr*10
  };
}

function initials(n){
  return n.split(" ").map(x=>x[0]).join("");
}

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// ================= TEAM =================
let team = {
  roster:[
    player("Jay Smith"),
    player("Mike Brown"),
    player("Chris Davis")
  ],
  cap:1000
};

let freeAgents = [
  player("Ty Wilson"),
  player("Cam Johnson"),
  player("Zay Miller")
];

// ================= ROSTER =================
function renderRoster(){
  let div=document.getElementById("rosterList");
  div.innerHTML="";

  team.roster.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="avatar">${p.img}</div>
          ${p.name} | OVR ${p.ovr}
        </div>
        <button class="btn" onclick="cut(${i})">Cut</button>
      </div>`;
  });
}

function cut(i){
  team.roster.splice(i,1);
  renderRoster();
}

// ================= FREE AGENCY =================
function renderFA(){
  let div=document.getElementById("faList");
  div.innerHTML="";

  freeAgents.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="avatar">${p.img}</div>
          ${p.name} | OVR ${p.ovr}
        </div>
        <button class="btn" onclick="sign(${i})">Sign</button>
      </div>`;
  });
}

function sign(i){
  let p=freeAgents[i];
  if(team.cap < p.salary){
    alert("No cap space!");
    return;
  }

  team.cap -= p.salary;
  team.roster.push(p);
  freeAgents.splice(i,1);

  renderFA();
}

// ================= TRADE =================
function renderTrade(){
  let div=document.getElementById("tradeList");
  div.innerHTML="";

  let other = player("CPU Star QB");

  div.innerHTML = `
    <div class="card">
      ${other.name} OVR ${other.ovr}
      <button class="btn" onclick="trade()">Offer Trade</button>
    </div>`;
}

function trade(){
  let my = team.roster[0];
  let cpu = player("CPU QB");

  if(cpu.ovr > my.ovr){
    alert("Trade rejected");
  } else {
    team.roster[0]=cpu;
    alert("Trade accepted!");
  }
}

// ================= 1v1 GAME ENGINE =================
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let qb, def, ball;

function startGame(){
  qb={x:100,y:175};
  def={x:400,y:175};
  ball={x:100,y:175,inAir:false,target:null};

  loop();
}

function update(){
  if(keys["w"]) qb.y-=3;
  if(keys["s"]) qb.y+=3;
  if(keys["d"]) qb.x+=3;

  def.x += (qb.x - def.x)*0.04;
  def.y += (qb.y - def.y)*0.04;

  if(Math.abs(def.x-qb.x)<12){
    alert("TACKLED");
    startGame();
  }

  if(qb.x>650){
    alert("TOUCHDOWN");
    startGame();
  }
}

function draw(){
  ctx.clearRect(0,0,700,350);

  ctx.fillStyle="yellow";
  ctx.fillRect(qb.x,qb.y,14,14);

  ctx.fillStyle="white";
  ctx.fillRect(def.x,def.y,14,14);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// controls
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);

// auto start game when play tab opens
document.getElementById("play").addEventListener("click",startGame);

</script>

</body>
</html>
